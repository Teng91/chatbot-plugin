name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'chatbot-plugin-ui/v*'

defaults:
  run:
    working-directory: frontend/packages/chatbot-plugin-ui

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@Teng91'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/chatbot-plugin-ui/v}"
          npm version "$TAG_VERSION" --no-git-tag-version

      - name: Bump version
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump package version [skip ci]"
          git push
