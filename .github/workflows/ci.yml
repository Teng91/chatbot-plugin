name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  # -----------------------------------------------
  # Unit Tests
  # -----------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests with coverage
        run: uv run pytest src/tests/ -v --tb=short --cov=chatbot_plugin --cov-report=xml:coverage.xml --junitxml=pytest.xml

      - name: Pytest Coverage Comment
        if: github.event_name == 'pull_request'
        id: coverage
        uses: MishaKav/pytest-coverage-comment@v1.6.0
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          title: Unit Test Coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write coverage to job summary
        if: always()
        env:
          REPORT: ${{ steps.coverage.outputs.summaryReport }}
        run: echo "$REPORT" >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------
  # Integration Tests (requires PG + pgvector)
  # -----------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-test]
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run alembic upgrade for test DB
        run: uv run alembic upgrade head
        env:
          CHATBOT_DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_test

      - name: Run integration tests with coverage
        run: uv run pytest src/tests/ -v --tb=short -m integration --cov=chatbot_plugin --cov-report=xml:coverage-integration.xml --junitxml=pytest-integration.xml
        env:
          CHATBOT_DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_test
