name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  # -----------------------------------------------
  # Stage 0: DB Migration (push to master only)
  # -----------------------------------------------
  migrate:
    name: DB Migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: chatbot-plugin / production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen --all-groups
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Run alembic upgrade
        run: uv run alembic upgrade head
        env:
          CHATBOT_DATABASE_URL: ${{ secrets.CHATBOT_DATABASE_URL }}

  # -----------------------------------------------
  # Stage 1: Unit Tests
  # -----------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [migrate]
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen --all-groups
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Run unit tests with coverage
        run: uv run pytest src/tests/ -v --tb=short --cov=chatbot_plugin --cov-report=xml:coverage.xml --junitxml=pytest.xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Pytest Coverage Comment
        id: coverage
        uses: MishaKav/pytest-coverage-comment@v1.6.0
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          title: Unit Test Coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute pass rate
        id: passrate
        run: |
          TESTS="${{ steps.coverage.outputs.tests }}"
          FAILURES="${{ steps.coverage.outputs.failures }}"
          ERRORS="${{ steps.coverage.outputs.errors }}"
          SKIPPED="${{ steps.coverage.outputs.skipped }}"
          TESTS=${TESTS:-0}; FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; SKIPPED=${SKIPPED:-0}
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          if [ "$TESTS" -eq 0 ]; then
            COLOR="lightgrey"; MSG="no tests"
          elif [ $((FAILURES + ERRORS)) -eq 0 ]; then
            COLOR="brightgreen"; MSG="${PASSED}/${TESTS} passed"
          elif [ $((PASSED * 100 / TESTS)) -ge 90 ]; then
            COLOR="green"; MSG="${PASSED}/${TESTS} passed"
          elif [ $((PASSED * 100 / TESTS)) -ge 75 ]; then
            COLOR="yellow"; MSG="${PASSED}/${TESTS} passed"
          else
            COLOR="red"; MSG="${PASSED}/${TESTS} passed"
          fi
          echo "msg=${MSG}" >> $GITHUB_OUTPUT
          echo "color=${COLOR}" >> $GITHUB_OUTPUT

      - name: Write coverage to job summary
        if: always()
        env:
          REPORT: ${{ steps.coverage.outputs.summaryReport }}
        run: echo "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Update unit pass rate badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: unit-passrate.json
          label: unit tests
          message: ${{ steps.passrate.outputs.msg }}
          color: ${{ steps.passrate.outputs.color }}

  # -----------------------------------------------
  # Stage 2: Integration Tests (requires PG + pgvector)
  # -----------------------------------------------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [migrate, unit-test]
    if: |
      always() &&
      needs.unit-test.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    timeout-minutes: 30

    env:
      CI_DB_USER: ci
      CI_DB_PASSWORD: ci
      CI_DB_NAME: ci_test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen --all-groups
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Run alembic upgrade for test DB
        run: uv run alembic upgrade head
        env:
          CHATBOT_DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_test

      - name: Run integration tests with coverage
        run: uv run pytest src/tests/ -v --tb=short -m integration --cov=chatbot_plugin --cov-report=xml:coverage-integration.xml --junitxml=pytest-integration.xml
        env:
          CHATBOT_DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-integration.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Pytest Coverage Comment
        id: coverage
        uses: MishaKav/pytest-coverage-comment@v1.6.0
        with:
          pytest-xml-coverage-path: ./coverage-integration.xml
          junitxml-path: ./pytest-integration.xml
          title: Integration Test Coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute pass rate
        id: passrate
        run: |
          TESTS="${{ steps.coverage.outputs.tests }}"
          FAILURES="${{ steps.coverage.outputs.failures }}"
          ERRORS="${{ steps.coverage.outputs.errors }}"
          SKIPPED="${{ steps.coverage.outputs.skipped }}"
          TESTS=${TESTS:-0}; FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; SKIPPED=${SKIPPED:-0}
          PASSED=$((TESTS - FAILURES - ERRORS - SKIPPED))
          if [ "$TESTS" -eq 0 ]; then
            COLOR="lightgrey"; MSG="no tests"
          elif [ $((FAILURES + ERRORS)) -eq 0 ]; then
            COLOR="brightgreen"; MSG="${PASSED}/${TESTS} passed"
          elif [ $((PASSED * 100 / TESTS)) -ge 90 ]; then
            COLOR="green"; MSG="${PASSED}/${TESTS} passed"
          elif [ $((PASSED * 100 / TESTS)) -ge 75 ]; then
            COLOR="yellow"; MSG="${PASSED}/${TESTS} passed"
          else
            COLOR="red"; MSG="${PASSED}/${TESTS} passed"
          fi
          echo "msg=${MSG}" >> $GITHUB_OUTPUT
          echo "color=${COLOR}" >> $GITHUB_OUTPUT

      - name: Write coverage to job summary
        if: always()
        env:
          REPORT: ${{ steps.coverage.outputs.summaryReport }}
        run: echo "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Update integration pass rate badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: integration-passrate.json
          label: integration tests
          message: ${{ steps.passrate.outputs.msg }}
          color: ${{ steps.passrate.outputs.color }}

  # -----------------------------------------------
  # Stage 5: DB Rollback (push to master, on test failure)
  # -----------------------------------------------
  rollback:
    name: DB Rollback
    runs-on: ubuntu-latest
    needs: [migrate, unit-test, integration-test]
    if: |
      always() &&
      needs.migrate.result == 'success' &&
      (needs.unit-test.result == 'failure' || needs.integration-test.result == 'failure')
    environment: chatbot-plugin / production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen --all-groups
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Rollback one revision
        run: uv run alembic downgrade -1
        env:
          CHATBOT_DATABASE_URL: ${{ secrets.CHATBOT_DATABASE_URL }}
