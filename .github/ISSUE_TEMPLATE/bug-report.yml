name: Bug Report 🐛
description: File a bug report.
title: "[Bug] "
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description on what the bug is.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description:  Steps to reproduce the bug
      placeholder: |
        Examples of the steps:
        1. Pass ... to ...
        2. See error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what you actually saw.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Context
      description: Any other context about the problem (ex. slack message).
      placeholder: https://weathernews.slack.com/
